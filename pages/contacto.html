<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/main.css">
  <title>Formulario de contacto</title>
</head>
<body class="form_info">

  <div class="caja_form">
    <h1 id="form-titulo" class="titulo">Formulario de contacto</h1>

    <form action="/enviar-datos" method="post" enctype="multipart/form-data">

      <div class="grupo">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Escribe tu nombre" required>
      </div>

      <div class="grupo">
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" placeholder="Escribe tu apellido" required>
      </div>

      <div class="grupo">
        <label for="correo">Correo electrónico:</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@dominio.com" required>
      </div>

      <div class="grupo">
        <label for="región">Región:</label>
        <select id="región" name="pais">
          <option value="bi">Bizkaia</option>
          <option value="SS">Gipuzkoa</option>
          <option value="vi">Álava</option>
        </select>
      </div>

      <div class="grupo">
        <p class="genero_titulo">Género:</p>
        <div class="grupo_radio">
          <label class="radio-item">
            <input type="radio" name="genero"> Hombre
          </label>

          <label class="radio-item">
            <input type="radio" name="genero"> Mujer
          </label>

          <label class="radio-item">
            <input type="radio" name="genero"> Otro
          </label>
        </div>
      </div>

      <div class="grupo">
        <label for="comentarios">Comentarios:</label>
      <textarea id="comentarios" name="comentarios" rows="4" cols="50" placeholder="Escribe tus comentarios aquí"></textarea>
      </div>

      <button class="btn_enviar">enviar</button>

    </form>
  </div>
  
</body>
</html>
